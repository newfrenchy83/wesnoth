#textdomain wesnoth-test

#define EVENT_TEST_DISTANT RADIUS
    [event]
        name=start

        [object]
            silent=yes
            [effect]
                apply_to=new_ability
                [abilities]
                    [damage]
                        id=specialX
                        name=_ "specialX"
                        description=_ "specialX is active if and only if one unit within 1 hex radius is alice"
                        value=100
                        apply_to=self
                        affect_self=no
                        affect_allies=yes
                        affect_enemies=yes
                        [affect_distant]
                            radius={RADIUS}
                            [filter]
                                id=alice
                            [/filter]
                        [/affect_distant]
                    [/damage]
                [/abilities]
            [/effect]
            [filter]
                id=charlie
            [/filter]
        [/object]

        {ASSERT (
            [not]
                [have_unit]
                    id=alice
                    ability_id_active=specialX
                [/have_unit]
            [/not]
        )}

        {SUCCEED}
    [/event]
#enddef

#####
# API(s) being tested: ability[affect_distant]radius=
##
# Actions:
# Give charlie an ability specialX, which is affect alice if she in 1 hexes of distance of alex.
# Test whether the ability is active.
##
# Expected end state:
# specialX shouln'd be affect alice.
#####

{SEPARATE_KEEP_A_B_C_D_UNIT_TEST "affect_distant_inactive" (
    affect_distant_max_radius=3
    {EVENT_TEST_DISTANT 1}
)}

#####
# API(s) being tested: ability[affect_distant]radius= without affect_distant_max_radius option
##
# Actions:
# Give charlie an ability specialX, which is affect alice if she in 10 hexes of distance of alex but without define affect_distant_max_radius.
# Test whether the ability is active.
##
# Expected end state:
# specialX shouln'd be affect alice because check of distant unit not usable.
#####
{SEPARATE_KEEP_A_B_C_D_UNIT_TEST "affect_distant_no_max_radius" (
    {EVENT_TEST_DISTANT 10}
)}

#####
# API(s) being tested: ability[affect_distant]radius=
##
# Actions:
# Give charlie an ability specialX, which is affect alice if she in 10 hexes of distance of alex but with affect_distant_max_radius to 3 only.
# Test whether the ability is active.
##
# Expected end state:
# specialX shouln'd be affect alice because only unit around alice to a radius to 3 hexes maximum can be checked.
#####
{SEPARATE_KEEP_A_B_C_D_UNIT_TEST "affect_distant_max_radius_too_low" (
    affect_distant_max_radius=3
    {EVENT_TEST_DISTANT 10}
)}

#undef EVENT_TEST_DISTANT
